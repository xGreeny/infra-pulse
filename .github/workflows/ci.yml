name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-windows-powershell:
    name: Verify / Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify module
        shell: powershell
        run: .\build.ps1 -Task Verify -Bootstrap

  verify-powershell-7:
    name: Verify / PowerShell 7
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify module
        shell: pwsh
        run: .\build.ps1 -Task Verify -Bootstrap

      - name: Upload verification artifacts
        uses: actions/upload-artifact@v7
        with:
          name: InfraPulse-verification-${{ github.sha }}
          path: |
            out/InfraPulse-*.zip
            out/InfraPulse-*.zip.sha256
            test-results/*.xml
          if-no-files-found: error
          retention-days: 14