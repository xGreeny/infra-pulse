name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Verify and publish
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag matches module version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile -Path .\src\InfraPulse\InfraPulse.psd1
          $expectedTag = "v$($manifest.ModuleVersion)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
              throw "Tag '$env:GITHUB_REF_NAME' does not match manifest version '$expectedTag'."
          }

      - name: Verify and package module
        shell: pwsh
        run: .\build.ps1 -Task Verify -Bootstrap

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $manifest = Import-PowerShellDataFile -Path .\src\InfraPulse\InfraPulse.psd1
          $version = [string]$manifest.ModuleVersion
          gh release create $env:GITHUB_REF_NAME `
              --verify-tag `
              --title "InfraPulse $version" `
              --generate-notes `
              "out/InfraPulse-$version.zip" `
              "out/InfraPulse-$version.zip.sha256"
