name: Publish to PowerShell Gallery

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v1.4.0)
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish tagged module
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag matches module version
        shell: pwsh
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          $manifest = Import-PowerShellDataFile -Path .\src\InfraPulse\InfraPulse.psd1
          $expectedTag = "v$($manifest.ModuleVersion)"
          if ($env:REQUESTED_TAG -ne $expectedTag) {
              throw "Tag '$env:REQUESTED_TAG' does not match manifest version '$expectedTag'."
          }

      - name: Publish module
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
              throw 'The PSGALLERY_API_KEY secret is not configured.'
          }
          $manifest = Import-PowerShellDataFile -Path .\src\InfraPulse\InfraPulse.psd1
          $version = [string]$manifest.ModuleVersion
          $existing = Find-PSResource -Name InfraPulse -Version $version -Repository PSGallery -ErrorAction SilentlyContinue
          if ($null -ne $existing) {
              Write-Host "InfraPulse $version is already published to the PowerShell Gallery."
              return
          }
          Publish-PSResource -Path .\src\InfraPulse -Repository PSGallery -ApiKey $env:PSGALLERY_API_KEY
          Write-Host "Published InfraPulse $version to the PowerShell Gallery."
